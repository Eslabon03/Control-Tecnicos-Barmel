<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Técnicos - Barmel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container" style="max-width: 800px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center">
                <img src="/static/logo.png" alt="Barmel" height="60" class="me-3 shadow-sm rounded">
                <h2 class="mb-0 text-primary fw-bold">🤵 Gestión de Técnicos</h2>
            </div>
            <a href="/admin" class="btn btn-outline-secondary fw-bold">← Volver al Panel</a>
        </div>

        <div class="card shadow border-0 mb-4">
            <div class="card-header bg-dark text-white fw-bold">
                ➕ Agregar Nuevo Técnico
            </div>
            <div class="card-body">
                <form method="POST" action="/admin/tecnicos" class="d-flex gap-2">
                    <input type="text" name="nombre" class="form-control" placeholder="Nombre completo del técnico" required autocomplete="off">
                    <button type="submit" class="btn btn-success fw-bold px-4">Guardar</button>
                </form>
            </div>
        </div>

        <div class="card shadow border-0">
            <div class="card-body p-0 table-responsive">
                <table class="table table-hover table-striped mb-0 text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID Técnico</th>
                            <th>Nombre Completo</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for t in tecnicos %}
                        <tr>
                            <td class="text-secondary fw-bold">#{{ t.id }}</td>
                            <td class="fw-bold fs-5 text-dark">{{ t.nombre }}</td>
                            <td>
                                <button type="button" class="btn btn-sm btn-outline-primary shadow-sm me-2 fw-bold" onclick="editarTecnico({{ t.id }}, '{{ t.nombre | escape }}')">✏️ Editar</button>
                                <form method="POST" action="/admin/tecnicos/borrar/{{ t.id }}" style="display:inline;" onsubmit="return confirm('¿Estás seguro de que deseas borrar definitivamente a este técnico? ¡Revisa que no tenga reportes activos antes de borrarlo!');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger shadow-sm fw-bold">🗑️ Borrar</button>
                                </form>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="3" class="text-muted p-4">Aún no hay técnicos en la base de datos.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
    function editarTecnico(id, nombreActual) {
        let nuevoNombre = prompt("Editar nombre del técnico:", nombreActual);
        
        if (nuevoNombre !== null && nuevoNombre.trim() !== "" && nuevoNombre.trim() !== nombreActual) {
            let form = document.createElement("form");
            form.method = "POST";
            form.action = "/admin/tecnicos/editar/" + id;
            
            let input = document.createElement("input");
            input.type = "hidden";
            input.name = "nombre";
            input.value = nuevoNombre.trim();
            
            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
        }
    }
    </script>
</body>
</html>
